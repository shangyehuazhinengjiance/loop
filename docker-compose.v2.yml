# Loop v2 本地全栈（MySQL + Orchestrator + Agent Worker + Gateway + Web）
# 用法: docker compose -f docker-compose.v2.yml up -d --build
#
# 首次启动后访问 http://localhost:3002/v2
# 数据库 loop_v2 由 orchestrator-v2 启动时自动 migrate

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_USER: loop
      MYSQL_PASSWORD: loop
      MYSQL_DATABASE: loop_v2
      MYSQL_ROOT_PASSWORD: loop-root
    ports:
      - "3306:3306"
    volumes:
      - loop_v2_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "loop", "-ploop"]
      interval: 5s
      timeout: 5s
      retries: 15

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator-v2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://loop:loop@mysql:3306/loop_v2
      AGENT_WORKER_URL: http://agent-worker:3010
      WORKSPACE_ROOT: /data/workspaces
      ORCHESTRATOR_PORT: "3000"
    volumes:
      - loop_workspaces:/data/workspaces
    depends_on:
      mysql:
        condition: service_healthy

  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.agent-worker
    ports:
      - "3010:3010"
    environment:
      AGENT_WORKER_PORT: "3010"
      ORCHESTRATOR_URL: http://orchestrator:3000
      WORKSPACE_ROOT: /data/workspaces
      PM_MODEL_API_KEY: ${PM_MODEL_API_KEY:-}
      DEV_MODEL_API_KEY: ${DEV_MODEL_API_KEY:-}
      OPS_MODEL_API_KEY: ${OPS_MODEL_API_KEY:-}
      PM_MODEL_BASE_URL: ${PM_MODEL_BASE_URL:-}
      DEV_MODEL_BASE_URL: ${DEV_MODEL_BASE_URL:-}
      OPS_MODEL_BASE_URL: ${OPS_MODEL_BASE_URL:-}
      LITELLM_PROXY_URL: ${LITELLM_PROXY_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
    volumes:
      - loop_workspaces:/data/workspaces
    depends_on:
      - orchestrator

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "3001:3001"
    environment:
      WS_PORT: "3001"
      ORCHESTRATOR_URL: http://orchestrator:3000
    depends_on:
      - orchestrator

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_ORCHESTRATOR_URL: http://localhost:3000
        NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
    depends_on:
      - gateway
      - orchestrator

volumes:
  loop_v2_mysql_data:
  loop_workspaces:
