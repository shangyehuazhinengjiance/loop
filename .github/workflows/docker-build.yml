# 构建三个 Docker 镜像（推送到 Harbor 等需在仓库 Settings → Secrets 配置）
# 触发：push 到 master/test，或手动 workflow_dispatch

name: Docker Build

on:
  push:
    branches: [master, main, test]
  workflow_dispatch:

env:
  REGISTRY: harbor.qihoo.net/ai-native
  DOCKER_BUILDKIT: "1"
  # 按实际修改；不 push 时可只 build

jobs:
  build-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify monorepo layout
        run: test -f packages/shared/package.json

      - name: Build orchestrator
        run: docker build -f Dockerfile -t loop-orchestrator:${{ github.sha }} .

  build-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.gateway -t loop-gateway:${{ github.sha }} .

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker build -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_ORCHESTRATOR_URL=${{ vars.NEXT_PUBLIC_ORCHESTRATOR_URL || 'http://localhost:3000' }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'ws://localhost:3001' }} \
            -t loop-web:${{ github.sha }} .

  # 可选：登录 Harbor 并 push（需配置 secrets）
  # push:
  #   needs: [build-orchestrator, build-gateway, build-web]
  #   runs-on: ubuntu-latest
  #   steps:
  #     - run: echo "docker login && docker push ..."
