# AI Native Loop — 单机 Docker Compose 部署
# 在 deploy/server 目录执行：./deploy.sh up

name: loop

services:
  orchestrator:
    image: loop-orchestrator:${LOOP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/server/dockerfiles/orchestrator.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    restart: unless-stopped
    env_file: .env
    environment:
      ORCHESTRATOR_URL: http://orchestrator:3000
    volumes:
      - ${WORKSPACE_HOST_PATH:-./data/workspaces}:/data/workspaces
      - ${GIT_SSH_KEY_HOST_PATH:-./data/git-secrets}:/secrets/git:ro
    ports:
      - "${ORCHESTRATOR_PUBLISH_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/projects"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  gateway:
    image: loop-gateway:${LOOP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/server/dockerfiles/gateway.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    restart: unless-stopped
    env_file: .env
    environment:
      ORCHESTRATOR_URL: http://orchestrator:3000
    ports:
      - "${GATEWAY_PUBLISH_PORT:-3001}:3001"
    depends_on:
      orchestrator:
        condition: service_started

  web:
    image: loop-web:${LOOP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: deploy/server/dockerfiles/web.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NEXT_PUBLIC_ORCHESTRATOR_URL: ${NEXT_PUBLIC_ORCHESTRATOR_URL:-http://localhost:3000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEB_PUBLISH_PORT:-3002}:3002"
    depends_on:
      - gateway
      - orchestrator

  # 可选：本机 MySQL（无托管库时使用）
  # 启动：docker compose --profile local-db up -d
  mysql:
    profiles: ["local-db"]
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-loop_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-loop}
      MYSQL_USER: ${MYSQL_USER:-loop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-loop}
    volumes:
      - ${MYSQL_DATA_PATH:-./data/mysql}:/var/lib/mysql
      - ../mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
