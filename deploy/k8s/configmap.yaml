apiVersion: v1
kind: ConfigMap
metadata:
  name: loop-config
  namespace: loop
data:
  # ── Orchestrator ──────────────────────────────────────
  ORCHESTRATOR_PORT: "3000"
  # 集群内 Service 地址，Agent 回调用
  ORCHESTRATOR_URL: "http://loop-orchestrator:3000"
  WORKSPACE_ROOT: "/data/workspaces"

  # PM 模型（非密钥部分）
  PM_MODEL_BASE_URL: "https://api.anthropic.com"
  PM_MODEL_NAME: "claude-sonnet-4-20250514"

  # Dev 模型
  DEV_MODEL_BASE_URL: "https://api.anthropic.com"
  DEV_MODEL_NAME: "claude-sonnet-4-20250514"
  DEV_MODEL_FAST: "claude-3-5-haiku-20241022"

  # Ops 模型
  OPS_MODEL_BASE_URL: "https://api.anthropic.com"
  OPS_MODEL_NAME: "claude-sonnet-4-20250514"

  # LiteLLM（可选，不用则删除或留空）
  # LITELLM_PROXY_URL: "http://litellm:4000/v1"

  # ── Gateway ─────────────────────────────────────────
  WS_PORT: "3001"

  # ── Web ─────────────────────────────────────────────
  PORT: "3002"
  HOSTNAME: "0.0.0.0"
