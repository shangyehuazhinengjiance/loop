apiVersion: apps/v1
kind: Deployment
metadata:
  name: loop-web
  namespace: loop
  labels:
    app: loop-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loop-web
  template:
    metadata:
      labels:
        app: loop-web
    spec:
      containers:
        - name: web
          image: harbor.qihoo.net/ai-native/loop-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
          envFrom:
            - configMapRef:
                name: loop-config
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
