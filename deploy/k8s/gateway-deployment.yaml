apiVersion: apps/v1
kind: Deployment
metadata:
  name: loop-gateway
  namespace: loop
  labels:
    app: loop-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loop-gateway
  template:
    metadata:
      labels:
        app: loop-gateway
    spec:
      containers:
        - name: gateway
          image: harbor.qihoo.net/ai-native/loop-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: ORCHESTRATOR_URL
              value: "http://loop-orchestrator:3000"
            - name: WS_PORT
              valueFrom:
                configMapKeyRef:
                  name: loop-config
                  key: WS_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
