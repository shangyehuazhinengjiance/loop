services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_USER: loop
      MYSQL_PASSWORD: loop
      MYSQL_DATABASE: loop
      MYSQL_ROOT_PASSWORD: loop-root
    ports:
      - "3306:3306"
    volumes:
      - loop_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "loop", "-ploop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  litellm:
    profiles: ["litellm"]
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-loop-litellm}

volumes:
  loop_mysql_data:
